name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller requests beautifulsoup4 pillow

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --noconsole --icon=icon.ico --name bnZ-OverlayCreator bnZ-OverlayCreator.py

      - name: Zip EXE
        run: |
          Compress-Archive -Path dist\bnZ-OverlayCreator.exe -DestinationPath dist\bnZ-OverlayCreator.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bnZ-OverlayCreator
          path: dist\bnZ-OverlayCreator.zip
          retention-days: 30
